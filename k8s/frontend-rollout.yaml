apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: jobportal-frontend-rollout
  namespace: default
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: jobportal-frontend
  template:
    metadata:
      labels:
        app: jobportal-frontend
    spec:
      containers:
      - name: jobportal-frontend
        image: solosahej/jobportal-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "150m"
  
  # ----------------------------------------------------
  # BLUE-GREEN DEPLOYMENT STRATEGY
  # ----------------------------------------------------
  strategy:
    blueGreen:
      activeService: jobportal-frontend-active
      previewService: jobportal-frontend-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 30
